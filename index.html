<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLASSX</title>
<meta name="description" content="PLASSX. AI Intelligence Beyond Human Observation.">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white: #FFFFFF;
  --soft: rgba(255,255,255,0.74);
  --blue: #2F7DFF;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  min-height: 100%;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #020710;
  color: var(--white);
  overflow: hidden;
}

main {
  position: relative;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px;
  isolation: isolate;
}

main::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(2,7,16,0.18) 0%, rgba(2,7,16,0.48) 100%),
    radial-gradient(circle at center, rgba(47,125,255,0.12), transparent 34%),
    url('assets/images/plassx-bg.png') center / cover no-repeat;
  z-index: -2;
}

main::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(2,7,16,0.42), transparent 24%, transparent 76%, rgba(2,7,16,0.42)),
    rgba(2,7,16,0.18);
  z-index: -1;
}

.centerpiece {
  width: min(720px, 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transform: translateY(-2vh);
}

.logo-mark {
  position: relative;
  width: clamp(190px, 22vw, 360px);
  aspect-ratio: 2487 / 589;
  filter: drop-shadow(0 18px 42px rgba(0,0,0,0.58));
}

.logo {
  display: block;
  position: absolute;
  inset: 0;
  width: 100%;
  height: auto;
}

.logo-white {
  filter: brightness(0) invert(1);
}

.logo-color {
  clip-path: inset(0 0 0 80%);
}

.statement {
  margin-top: clamp(22px, 3vw, 34px);
  font-size: clamp(24px, 3.2vw, 48px);
  line-height: 1.14;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--white);
  text-shadow: 0 12px 38px rgba(0,0,0,0.74);
}

.statement span {
  color: var(--soft);
}

.glow-line {
  width: min(360px, 48vw);
  height: 1px;
  margin-top: clamp(22px, 3vw, 34px);
  background: linear-gradient(90deg, transparent, rgba(47,125,255,0.86), transparent);
  box-shadow: 0 0 28px rgba(47,125,255,0.72);
}

@media (max-width: 768px) {
  body {
    overflow: auto;
  }

  main {
    min-height: 100svh;
    padding: 28px;
  }

  main::before {
    background-position: center;
  }
}
</style>
</head>
<body>
<main aria-label="PLASSX">
  <section class="centerpiece">
    <div class="logo-mark" aria-label="PLASSX">
      <img class="logo logo-white" src="assets/images/plassx-logo.png" alt="">
      <img class="logo logo-color" src="assets/images/plassx-logo.png" alt="">
    </div>
    <h1 class="statement">AI Intelligence Beyond <span>Human Observation.</span></h1>
    <div class="glow-line" aria-hidden="true"></div>
  </section>
</main>
</body>
</html>
