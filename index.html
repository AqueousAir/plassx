<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLASSX</title>
  <meta name="description"
    content="PLASSX is a strategic holding and investment firm focused on identifying, building, and scaling high-impact ventures across emerging technologies and critical infrastructure sectors." />
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="hero" id="top">
    <video class="hero-video" autoplay muted loop playsinline preload="metadata" poster="assets/plassx-logo.png"
      aria-hidden="true">
      <source src="assets/hero.mp4" type="video/mp4" />
      Your browser does not support the background video.
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1 class="sr-only">PLASSX Holding Company</h1>
      <img class="hero-logo" src="assets/plassx-logo.png" alt="PLASSX logo" />
      <p>PLASSX is a strategic holding and investment firm focused on identifying, building, and scaling high-impact
        ventures across emerging technologies and critical infrastructure sectors.</p>
      <h2 class="portfolio-title">Our Portfolio</h2>
      <div class="portfolio-grid">
        <a class="company-card" href="https://aquaaeris.com" target="_blank" rel="noopener noreferrer"
          aria-label="Visit AQUA AERIS website">
          <div class="company-logo"><img src="assets/portfolio/aquaaeris_logo.jpeg" alt="AQUA AERIS logo" /></div>
          <span>AQUA AERIS</span>
        </a>

        <a class="company-card" href="https://airovia.io" target="_blank" rel="noopener noreferrer"
          aria-label="Visit AIROVIA website">
          <div class="company-logo"><img src="assets/portfolio/airovia_logo.jpeg" alt="AIROVIA logo" /></div>
          <span>AIROVIA</span>
        </a>

        <a class="company-card" href="https://soillex.com/" target="_blank" rel="noopener noreferrer"
          aria-label="Visit SOILLEX website">
          <div class="company-logo"><img src="assets/portfolio/soillex_logo.jpeg" alt="SOILLEX logo" /></div>
          <span>SOILLEX</span>
        </a>

        <a class="company-card" href="https://ventronenergy.com" target="_blank" rel="noopener noreferrer"
          aria-label="Visit VENTRON ENERGY website">
          <div class="company-logo"><img src="assets/portfolio/ventron_logo.jpeg" alt="VENTRON ENERGY logo" /></div>
          <span>VENTRON ENERGY</span>
        </a>
      </div>
    </div>

    <footer class="site-footer">PLASSX @2026</footer>
  </header>
</body>

</html>
